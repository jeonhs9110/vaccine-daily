server {
    listen 80;
    server_name vaccine-news.com www.vaccine-news.com;

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Still need this for Certbot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name vaccine-news.com www.vaccine-news.com;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/vaccine-news.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vaccine-news.com/privkey.pem;

    # SSL Parameters
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 1. Weather API Proxy
    location /1360000/ {
        proxy_pass https://apis.data.go.kr/1360000/;
        proxy_ssl_server_name on;
        
        # public data portal often requires correct Host header
        proxy_set_header Host apis.data.go.kr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. Main React App
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
    
    # 3. Backend API Proxy (To avoid "Mixed Content" error)
    # Frontend calls '/api/...' -> Nginx forwards to Backend:8000
    location /api/ {
        # 'backend' is the docker service name
        # IMPORTANT: Backend container port is 8000 internally
        proxy_pass http://backend:8000/;  
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
